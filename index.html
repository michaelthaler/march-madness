<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>March Madness Scorer 2026</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <h1>March Madness <span>Scorer</span> 2026</h1>
    <div class="header-actions">
      <button id="btn-export-json" class="btn btn-icon">Export JSON</button>
      <button id="btn-import-json" class="btn btn-icon">Import JSON</button>
      <button id="btn-reset" class="btn btn-danger btn-icon">Reset All</button>
    </div>
  </header>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="setup">Tournament Setup</button>
    <button class="tab-btn" data-tab="participants">Participants</button>
    <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
  </nav>

  <main>
    <!-- Tournament Setup Tab -->
    <section id="tab-setup" class="tab-content active">
      <div class="section-header">
        <h2>Tournament Bracket</h2>
        <div style="display:flex;gap:8px;">
          <button id="btn-import-results-csv" class="btn btn-small">Import Results CSV</button>
          <button id="btn-export-results-csv" class="btn btn-small">Export Results CSV</button>
        </div>
      </div>
      <p class="section-desc">Enter team names in Round of 64 slots. Click a team to advance them as the winner.</p>
      <div id="bracket-setup" class="bracket-container">
        <!-- bracket-view.js renders here -->
      </div>
    </section>

    <!-- Participants Tab -->
    <section id="tab-participants" class="tab-content">
      <div class="section-header">
        <h2>Participants</h2>
      </div>
      <div class="add-participant-row">
        <input type="text" id="input-participant-name" placeholder="Enter participant name...">
        <button id="btn-add-participant" class="btn btn-primary">Add</button>
      </div>
      <div id="participants-list">
        <!-- app.js renders participant cards here -->
      </div>
    </section>

    <!-- Leaderboard Tab -->
    <section id="tab-leaderboard" class="tab-content">
      <div class="section-header">
        <h2>Leaderboard</h2>
      </div>
      <div id="leaderboard-container">
        <!-- app.js renders the leaderboard table here -->
      </div>
    </section>
  </main>

  <!-- Bracket Detail/Picks Overlay -->
  <div id="bracket-overlay" class="bracket-overlay hidden">
    <div class="bracket-overlay-header">
      <h2 id="overlay-title"></h2>
      <div id="overlay-score-summary" class="overlay-score-summary"></div>
      <button id="btn-close-overlay" class="btn">Close</button>
    </div>
    <div class="bracket-overlay-body">
      <div id="bracket-overlay-content" class="bracket-container">
        <!-- bracket-view.js renders the detail/picks bracket here -->
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal hidden">
    <div class="modal-content">
      <h3 id="import-modal-title">Import</h3>
      <textarea id="import-textarea" rows="12" placeholder="Paste JSON or CSV here..."></textarea>
      <div class="modal-actions">
        <button id="btn-import-cancel" class="btn">Cancel</button>
        <button id="btn-import-confirm" class="btn btn-primary">Import</button>
      </div>
    </div>
  </div>

  <!-- Scripts in dependency order -->
  <script src="js/data.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/bracket-view.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
